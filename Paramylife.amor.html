<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corazón Animado</title>
<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
  }
  canvas#heart {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0,.2);
  }
</style>
</head>
<body>

<canvas id="heart"></canvas>

<script>
window.requestAnimationFrame = window.requestAnimationFrame ||
                               window.webkitRequestAnimationFrame ||
                               window.mozRequestAnimationFrame ||
                               window.oRequestAnimationFrame ||
                               window.msRequestAnimationFrame ||
                               function(callback, element) {
  var lastTime = element? element.__lastTime : undefined;
  if (lastTime === undefined) {
    lastTime = 0;
  }
  var currTime = Date.now();
  var timeToCall = Math.max(0, 33 - (currTime - lastTime));
  window.setTimeout(function() { callback(currTime + timeToCall); }, timeToCall);
  if (element) element.__lastTime = currTime + timeToCall;
};

var mobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
var koef = mobile? 0.5 : 1;
var canvas = document.getElementById('heart');
var ctx = canvas.getContext('2d');
var width = canvas.width = koef * window.innerWidth;
var height = canvas.height = koef * window.innerHeight;
var rand = Math.random;
ctx.fillStyle = "rgba(0,0,0,1)";
ctx.fillRect(0, 0, width, height);

var heartPosition = function(rad) {
  return [Math.pow(Math.sin(rad), 3), -(15 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad))];
};

var scaleAndTranslate = function(pos, sx, sy, dx, dy) {
  return [dx + pos[0] * sx, dy + pos[1] * sy];
};

window.addEventListener('resize', function() {
  width = canvas.width = koef * window.innerWidth;
  height = canvas.height = koef * window.innerHeight;
  ctx.fillStyle = "rgba(0,0,0,1)";
  ctx.fillRect(0, 0, width, height);
});

var traceCount = mobile? 20 : 50;
var pointsOrigin = [];
var dr = mobile? 0.3 : 0.1;
for (var i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 210, 13, 0, 0));
for (i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 150, 9, 0, 0));
for (i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 130, 10, 0, 0));

var pulse = function(kx, ky) {
  return (1 + 0.1 * Math.sin(Date.now() * 0.007 + kx + ky));
};

// Corrige rotación usando temporales para evitar usar p[0] modificado
var transform = function(points, tx, ty, sx, sy, rot) {
  return points.map(function(p) {
    var q = scaleAndTranslate(p, sx, sy, tx, ty);
    var x = q[0] - tx;
    var y = q[1] - ty;
    var xr = x * Math.cos(rot) + y * Math.sin(rot);
    var yr = y * Math.cos(rot) - x * Math.sin(rot);
    return [tx + xr, ty + yr];
  });
};

var pointsCount = pointsOrigin.length;
var theta = 0;
var dTheta = mobile? -0.05 : -0.02;

// Establece estilo de trazo para que el corazón se vea sobre fondo negro
ctx.strokeStyle = 'rgba(255,0,0,1)'; // rojo sólido
ctx.lineWidth = mobile ? 1.2 : 2.5;
ctx.lineJoin = 'round';

(function loop() {
  var tx = width / 2;
  var ty = height / 2;
  theta += dTheta;
  var scale = pulse(theta, tx) * 2.5;
  var rot = theta * 0.3;
  var p = transform(pointsOrigin, tx, ty, scale, scale, rot);
  
  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = "rgba(255, 0, 0, 0.05)";
  
  for (var i = 0; i < traceCount; i++) {
    ctx.beginPath();
    var start = Math.floor(i * pointsCount / traceCount);
    var end = Math.floor((i + 1) * pointsCount / traceCount);
    var points = p.slice(start, end);
    if (points.length > 0) {
      ctx.moveTo(points[0][0], points[0][1]);
      for (var j = 1; j < points.length; j++) {
        ctx.lineTo(points[j][0], points[j][1]);
      }
    }
    ctx.stroke();
  }
  
  window.requestAnimationFrame(loop);
})();
</script>
</body>
</html>
