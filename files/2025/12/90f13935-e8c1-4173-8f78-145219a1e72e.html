<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Matteo ✨</title>
<style>body{margin:0;background:white;font-family:Arial;overflow:hidden;transition:background .5s}.star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:fall linear infinite}@keyframes fall{from{transform:translateY(-10vh)}to{transform:translateY(110vh)}}#pantalla1{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;text-align:center;background:white}.pregunta{font-size:2em;color:black;text-shadow:0 0 10px rgba(0,0,0,.3),0 0 20px rgba(0,0,0,.2);animation:brillo 2s infinite alternate;margin-bottom:30px}@keyframes brillo{from{text-shadow:0 0 5px black}to{text-shadow:0 0 20px black,0 0 30px #555}}.botones{display:flex;gap:30px;position:relative}button{padding:15px 40px;font-size:1.2em;border:2px solid black;background:white;cursor:pointer;transition:.3s;border-radius:10px;z-index:10}#btnNo{position:relative}#btnSi:hover{background:black;color:white}#pantallaCarga{display:none;background:black;color:white;height:100vh;justify-content:center;align-items:center;flex-direction:column}.loader{border:5px solid #333;border-top:5px solid white;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}#sistemaSolar{display:none;background:black;color:white;min-height:100vh;text-align:center;padding:20px;overflow-y:auto}.planetas{display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:30px}.planeta{cursor:pointer;transition:transform .3s;width:80px}.planeta:hover{transform:scale(1.2)}.planeta div{width:60px;height:60px;border-radius:50%;margin:0 auto;box-shadow:0 0 15px rgba(255,255,255,.3)}#merc{background:#b1b1b1}#venus{background:#e6c229}#tierra{background:radial-gradient(circle,#2a7fff,#1a5db3,#228b22)}#marte{background:#c1440e}#jupiter{background:radial-gradient(circle,#d8ca9d,#bfa76a);width:90px;height:90px}#saturno{background:#e3d4a1;width:80px;height:80px;border:3px solid #c2b280}#urano{background:#7ec8e3}#neptuno{background:#4169e1}#mensajePlaneta{margin-top:40px;display:none;animation:aparecer .5s}@keyframes aparecer{from{opacity:0}to{opacity:1}}#mensajePlaneta div{width:150px;height:150px;border-radius:50%;margin:0 auto;box-shadow:0 0 30px rgba(255,255,255,.4)}#mensajePlaneta h2{margin:15px 0 10px;font-size:1.5em}#mensajePlaneta p{font-size:1.2em;max-width:600px;margin:0 auto;line-height:1.6}.explosion{animation:boom .4s ease-out}@keyframes boom{0%{transform:scale(1);opacity:1}100%{transform:scale(4);opacity:0}}</style>
</head>
<body>
<audio id="musica" loop><source src="https://cdn.pixabay.com/audio/2024/04/11/audio_2b6a1e8b1e.mp3" type="audio/mpeg"></audio>
<div id="pantalla1"><h1 class="pregunta">¿Quieres vivir una vida entera conmigo?</h1><div class="botones"><button id="btnSi">Sí</button><button id="btnNo">No</button></div></div>
<div id="pantallaCarga"><div class="loader"></div><p style="margin-top:20px;font-size:1.3em">Lo que quiero decirte mi amor...</p></div>
<div id="sistemaSolar"><h1>Nuestro Sistema Solar 💜</h1><div class="planetas"><div class="planeta" onclick="mostrarPlaneta('merc')"><div id="merc"></div><p>Mercurio</p></div><div class="planeta" onclick="mostrarPlaneta('venus')"><div id="venus"></div><p>Venus</p></div><div class="planeta" onclick="mostrarPlaneta('tierra')"><div id="tierra"></div><p>Tierra</p></div><div class="planeta" onclick="mostrarPlaneta('marte')"><div id="marte"></div><p>Marte</p></div><div class="planeta" onclick="mostrarPlaneta('jupiter')"><div id="jupiter"></div><p>Júpiter</p></div><div class="planeta" onclick="mostrarPlaneta('saturno')"><div id="saturno"></div><p>Saturno</p></div><div class="planeta" onclick="mostrarPlaneta('urano')"><div id="urano"></div><p>Urano</p></div><div class="planeta" onclick="mostrarPlaneta('neptuno')"><div id="neptuno"></div><p>Neptuno</p></div></div><div id="mensajePlaneta"></div></div>
<script>const btnNo=document.getElementById('btnNo'),btnSi=document.getElementById('btnSi'),musica=document.getElementById('musica');function crearEstrellas(){for(let i=0;i<50;i++){let s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'vw';s.style.animationDuration=3+Math.random()*5+'s';s.style.animationDelay=Math.random()*5+'s';document.body.appendChild(s)}}crearEstrellas();btnNo.addEventListener('mouseover',()=>{const x=Math.random()*(window.innerWidth-150),y=Math.random()*(window.innerHeight-150);btnNo.style.position='absolute';btnNo.style.left=x+'px';btnNo.style.top=y+'px'});btnSi.addEventListener('click',()=>{musica.play();document.getElementById('pantalla1').innerHTML="<h1 style='color:black'>Gracias por aceptar, sabia que dirias que si, te amo muack, eres lo mejor</h1>";setTimeout(()=>{document.body.style.background='black';document.getElementById('pantalla1').style.display='none';document.getElementById('pantallaCarga').style.display='flex';setTimeout(()=>{document.getElementById('pantallaCarga').classList.add('explosion');setTimeout(()=>{document.getElementById('pantallaCarga').style.display='none';document.getElementById('sistemaSolar').style.display='block'},400)},2000)},2000)});function mostrarPlaneta(p){const c=document.getElementById('mensajePlaneta');const d={merc:['#b1b1b1','¿Qué porque eres mercurio?','Eres mercurio para mí porque siempre seras lo primero en mi vida'],venus:['#e6c229','¿Por qué eres mi Venus?','Eres mi Venus porque a pesar de no estar tan cerca me haces sentir un calor arrullador en mi corazón.'],tierra:['radial-gradient(circle,#2a7fff,#1a5db3,#228b22)','¿Eres mi tierra?','Eres mi tierra porque eres lo que me permite seguir vivo y eres el unico "lugar" donde me siento verdaderamente seguro, te amo'],marte:['#c1440e','¿Por qué eres mi Marte?','Eres mi Marte porque contigo puedo ser guerrero y a la vez encontrar un hogar lleno de pasión.'],jupiter:['radial-gradient(circle,#d8ca9d,#bfa76a)','¿Por qué eres mi Júpiter?','Eres mi Júpiter porque eres gigante en mi vida. Me proteges de todo y tu gravedad me hace orbitar solo alrededor tuyo.'],saturno:['#e3d4a1','¿Por qué eres mi Saturno?','Eres mi Saturno porque con tus anillos me enseñas que incluso lo más lejano puede verse hermoso y completo.'],urano:['#7ec8e3','¿Por qué eres mi Urano?','Eres mi Urano porque eres único y diferente. Me haces ver el mundo de cabeza y me encanta.'],neptuno:['#4169e1','¿Por qué eres mi Neptuno?','Eres mi Neptuno porque estás lejos pero tu viento azul llega directo a mi alma y me calma.']};c.innerHTML=`<div style="background:${d[p][0]}"></div><h2><b>${d[p][1]}</b></h2><p>${d[p][2]}</p>`;c.style.display='block';window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})}</script>
</body>
  </html>
