<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amor School - Mobile Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #UI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
            pointer-events: auto;
        }
        
        .objective {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
            max-width: 200px;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
        }
        
        .joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            cursor: pointer;
            position: absolute;
            transition: all 0.05s;
        }
        
        .buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            flex-direction: column;
            z-index: 20;
            pointer-events: auto;
        }
        
        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            cursor: pointer;
            background: rgba(255, 100, 100, 0.8);
            color: white;
            font-weight: bold;
            transition: all 0.2s;
            pointer-events: auto;
        }
        
        button:active {
            transform: scale(0.9);
            background: rgba(255, 50, 50, 1);
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
        }

        .character-name {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #ff1493;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="UI">
            <div class="hud">
                <div>❤️ Amor: <span id="amorLevel">50</span>%</div>
                <div>⏱️ Tiempo: <span id="time">8:00</span></div>
                <div>📍 Nivel: <span id="level">1</span></div>
            </div>
            
            <div class="objective">
                <div id="objectiveText">Objetivo: Acercate a Sakura</div>
            </div>
            
            <div class="controls">
                <div class="joystick-stick" id="joystick"></div>
            </div>
            
            <div class="buttons">
                <button id="interactBtn" title="Interactuar">🎤</button>
                <button id="actionBtn" title="Acción">💝</button>
            </div>
            
            <div class="info">
                <div id="gameInfo">Toca a los personajes para interactuar</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ================== GAME ENGINE ==================
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.OrthographicCamera(
            window.innerWidth / -2, window.innerWidth / 2,
            window.innerHeight / 2, window.innerHeight / -2,
            0.1, 1000
        );
        camera.position.z = 500;
        camera.position.x = 100;
        camera.position.y = 100;
        
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // Luz
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(200, 200, 300);
        scene.add(light);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        // ================== PLAYER ==================
        class Player {
            constructor() {
                this.group = new THREE.Group();
                
                // Cuerpo
                const bodyGeometry = new THREE.CapsuleGeometry(20, 40, 4, 8);
                const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0xffc0cb });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.group.add(this.body);
                
                // Cabeza
                const headGeometry = new THREE.SphereGeometry(15, 8, 8);
                const headMaterial = new THREE.MeshPhongMaterial({ color: 0xffd1a3 });
                this.head = new THREE.Mesh(headGeometry, headMaterial);
                this.head.position.y = 35;
                this.group.add(this.head);
                
                // Ojos
                for (let i = -1; i <= 1; i += 2) {
                    const eyeGeometry = new THREE.SphereGeometry(3, 8, 8);
                    const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
                    const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                    eye.position.set(i * 5, 38, 12);
                    this.group.add(eye);
                }
                
                this.group.position.set(0, 0, 0);
                this.velocity = { x: 0, y: 0 };
                this.speed = 3;
                scene.add(this.group);
            }
            
            update() {
                this.group.position.x += this.velocity.x;
                this.group.position.y += this.velocity.y;
                
                // Limites de pantalla
                const limit = 300;
                this.group.position.x = Math.max(-limit, Math.min(limit, this.group.position.x));
                this.group.position.y = Math.max(-limit, Math.min(limit, this.group.position.y));
            }
            
            setVelocity(x, y) {
                this.velocity.x = x * this.speed;
                this.velocity.y = y * this.speed;
            }
        }
        
        // ================== PERSONAJES ==================
        class Character {
            constructor(name, x, y, color) {
                this.name = name;
                this.group = new THREE.Group();
                this.amorValue = 0;
                
                // Cuerpo
                const bodyGeometry = new THREE.CapsuleGeometry(18, 38, 4, 8);
                const bodyMaterial = new THREE.MeshPhongMaterial({ color: color });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.group.add(this.body);
                
                // Cabeza
                const headGeometry = new THREE.SphereGeometry(14, 8, 8);
                const headMaterial = new THREE.MeshPhongMaterial({ color: 0xffd1a3 });
                this.head = new THREE.Mesh(headGeometry, headMaterial);
                this.head.position.y = 32;
                this.group.add(this.head);
                
                // Ojos
                for (let i = -1; i <= 1; i += 2) {
                    const eyeGeometry = new THREE.SphereGeometry(2.5, 8, 8);
                    const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0xff1493 });
                    const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                    eye.position.set(i * 4, 34, 10);
                    this.group.add(eye);
                }
                
                // Etiqueta de nombre
                this.nameLabel = document.createElement('div');
                this.nameLabel.className = 'character-name';
                this.nameLabel.textContent = name;
                this.nameLabel.style.position = 'absolute';
                document.getElementById('UI').appendChild(this.nameLabel);
                
                this.group.position.set(x, y, 0);
                scene.add(this.group);
            }
            
            update(playerPos) {
                const dx = playerPos.x - this.group.position.x;
                const dy = playerPos.y - this.group.position.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // Moverse aleatoriamente
                if (Math.random() < 0.02) {
                    const angle = Math.random() * Math.PI * 2;
                    this.group.position.x += Math.cos(angle) * 2;
                    this.group.position.y += Math.sin(angle) * 2;
                }
                
                // Actualizar etiqueta
                const screenPos = getScreenPosition(this.group.position);
                this.nameLabel.style.left = (screenPos.x - 30) + 'px';
                this.nameLabel.style.top = (screenPos.y - 50) + 'px';
                
                return distance;
            }
            
            interact() {
                this.amorValue = Math.min(100, this.amorValue + 10);
                return this.amorValue;
            }
        }
        
        // ================== FUNCIONES AUXILIARES ==================
        function getScreenPosition(worldPos) {
            const vector = worldPos.clone();
            vector.project(camera);
            
            const x = (vector.x + 1) * window.innerWidth / 2;
            const y = (1 - vector.y) * window.innerHeight / 2;
            
            return { x, y };
        }
        
        // ================== INICIALIZAR JUEGO ==================
        const player = new Player();
        const characters = [
            new Character('Sakura 🌸', 150, 0, 0xff69b4),
            new Character('Yuki ❄️', -200, 100, 0x87ceeb),
            new Character('Akira ⚔️', 100, -200, 0xffa500),
        ];
        
        let gameTime = 8 * 60; // 8:00 AM
        let amorLevel = 50;
        let currentObjective = 0;
        let interactionCooldown = 0;
        
        // ================== CONTROLES ==================
        const keys = {};
        let joystickActive = false;
        let joystickPos = { x: 0, y: 0 };
        
        // Touch controls para joystick
        const joystickElement = document.getElementById('joystick');
        const controlsContainer = document.querySelector('.controls');
        
        controlsContainer.addEventListener('touchstart', (e) => {
            joystickActive = true;
            updateJoystick(e.touches[0]);
        });
        
        controlsContainer.addEventListener('touchmove', (e) => {
            if (joystickActive) {
                e.preventDefault();
                updateJoystick(e.touches[0]);
            }
        });
        
        controlsContainer.addEventListener('touchend', () => {
            joystickActive = false;
            joystickElement.style.transform = 'translate(0, 0)';
            player.setVelocity(0, 0);
        });
        
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        function updateJoystick(touch) {
            const rect = controlsContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const dx = (touch.clientX - centerX) / 60;
            const dy = (touch.clientY - centerY) / 60;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 1) {
                joystickPos.x = dx / distance;
                joystickPos.y = dy / distance;
            } else {
                joystickPos.x = dx;
                joystickPos.y = dy;
            }
            
            joystickElement.style.transform = `translate(${joystickPos.x * 35}px, ${joystickPos.y * 35}px)`;
            player.setVelocity(joystickPos.x, joystickPos.y);
        }
        
        // Botones de acción
        document.getElementById('interactBtn').addEventListener('click', () => {
            let closestChar = null;
            let closestDist = Infinity;
            
            characters.forEach(char => {
                const dx = player.group.position.x - char.group.position.x;
                const dy = player.group.position.y - char.group.position.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < closestDist && dist < 80) {
                    closestDist = dist;
                    closestChar = char;
                }
            });
            
            if (closestChar && interactionCooldown === 0) {
                const amor = closestChar.interact();
                amorLevel = Math.min(100, amorLevel + 5);
                document.getElementById('amorLevel').textContent = amorLevel;
                document.getElementById('gameInfo').textContent = `¡${closestChar.name} Amor: ${amor}%!`;
                interactionCooldown = 30;
            }
        });
        
        document.getElementById('actionBtn').addEventListener('click', () => {
            if (interactionCooldown === 0) {
                document.getElementById('gameInfo').textContent = '💝 ¡Acción especial!';
                interactionCooldown = 20;
            }
        });
        
        // Controles por teclado
        function handleKeyboardInput() {
            let moveX = 0;
            let moveY = 0;
            
            if (keys['w'] || keys['arrowup']) moveY = 1;
            if (keys['s'] || keys['arrowdown']) moveY = -1;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;
            
            if (moveX !== 0 || moveY !== 0) {
                const length = Math.sqrt(moveX * moveX + moveY * moveY);
                player.setVelocity(moveX / length, moveY / length);
            } else {
                player.setVelocity(0, 0);
            }
        }
        
        // ================== GAME LOOP ==================
        function animate() {
            requestAnimationFrame(animate);
            
            handleKeyboardInput();
            player.update();
            
            characters.forEach(char => {
                const dist = char.update(player.group.position);
            });
            
            // Actualizar tiempo
            gameTime++;
            const hours = Math.floor(gameTime / 60);
            const minutes = gameTime % 60;
            document.getElementById('time').textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            if (interactionCooldown > 0) interactionCooldown--;
            
            // Final del día
            if (gameTime > 18 * 60) {
                document.getElementById('gameInfo').textContent = '¡Fin del día! Vuelve mañana.';
                gameTime = 8 * 60;
            }
            
            renderer.render(scene, camera);
        }
        
        // ================== RESPONSIVE ==================
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.left = window.innerWidth / -2;
            camera.right = window.innerWidth / 2;
            camera.top = window.innerHeight / 2;
            camera.bottom = window.innerHeight / -2;
            camera.updateProjectionMatrix();
        });
        
        animate();
    </script>
</body>
</html>
