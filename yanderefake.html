<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amor School - Dark Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(to bottom, #2a2a4e 0%, #1a1a3e 100%);
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #UI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
            pointer-events: auto;
            border: 2px solid #ff1493;
        }
        
        .objective {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.9);
            color: #ffff00;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
            max-width: 220px;
            border: 2px solid #ff1493;
            font-weight: bold;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff1493;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
        }
        
        .joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            cursor: pointer;
            position: absolute;
            transition: all 0.05s;
            box-shadow: 0 0 10px #ff1493;
        }
        
        .buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            flex-direction: column;
            z-index: 20;
            pointer-events: auto;
        }
        
        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #ff1493;
            font-size: 20px;
            cursor: pointer;
            background: rgba(139, 0, 0, 0.8);
            color: #ffff00;
            font-weight: bold;
            transition: all 0.2s;
            pointer-events: auto;
        }
        
        button:active {
            transform: scale(0.9);
            background: rgba(255, 0, 0, 1);
            box-shadow: 0 0 15px #ff1493;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffff00;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
            border: 2px solid #ff6600;
            max-width: 300px;
        }

        .character-name {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            color: #ff1493;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid #ff1493;
        }

        .inventory {
            position: absolute;
            top: 140px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 10;
            pointer-events: auto;
            border: 2px solid #ff6600;
            max-width: 150px;
        }

        .inventory-item {
            padding: 5px;
            margin: 3px 0;
            background: rgba(100, 0, 0, 0.5);
            border-left: 3px solid #ff1493;
            cursor: pointer;
            border-radius: 3px;
        }

        .inventory-item:hover {
            background: rgba(150, 0, 0, 0.7);
            box-shadow: 0 0 10px #ff1493;
        }

        .warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.95);
            color: #ffff00;
            padding: 30px;
            border-radius: 12px;
            font-size: 20px;
            z-index: 100;
            text-align: center;
            border: 3px solid #ff1493;
            display: none;
            font-weight: bold;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        .reputation-bar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff6600;
            width: 200px;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            z-index: 10;
        }

        .reputation-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00);
            width: 100%;
            transition: width 0.3s;
        }

        .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ff1493;
            font-size: 32px;
            text-align: center;
        }

        .game-over-screen.show {
            display: flex;
        }

        .game-over-text {
            margin: 20px;
            font-weight: bold;
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .sempai-status {
            position: absolute;
            top: 50px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #ff1493;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 10;
            pointer-events: auto;
            border: 2px solid #ff1493;
            max-width: 150px;
        }

        .police-alert {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.9);
            color: #ffff00;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
            border: 2px solid #ffff00;
            display: none;
            font-weight: bold;
            animation: blink 0.3s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .principal-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .principal-dialog.show {
            display: flex;
        }

        .dialog-box {
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #ff1493;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            color: #ffff00;
            text-align: center;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .dialog-question {
            color: #ff6600;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .excuse-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .excuse-btn {
            width: 100%;
            padding: 15px;
            background: rgba(139, 0, 0, 0.8);
            border: 2px solid #ff1493;
            color: #ffff00;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .excuse-btn:hover {
            background: rgba(255, 0, 0, 1);
            box-shadow: 0 0 15px #ff1493;
        }

        .excuse-btn:active {
            transform: scale(0.95);
        }

        .npc-fleeing {
            color: #00ff00 !important;
            animation: blink 0.2s infinite;
        }

        .director-animation {
            animation: directorAppear 0.5s ease-out;
        }

        @keyframes directorAppear {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="UI">
            <div class="reputation-bar">
                <div class="reputation-fill" id="reputationFill" style="width: 100%;"></div>
            </div>

            <div class="hud">
                <div>💕 Obsesión: <span id="obsesionLevel">0</span>%</div>
                <div>⭐ Reputación: <span id="reputation">100</span>%</div>
                <div>⏱️ Hora: <span id="time">8:00</span></div>
            </div>

            <div class="sempai-status">
                <div>👑 Sempai</div>
                <div id="sempaiStatus">😊 Normal</div>
                <div id="sempaiObsesion">💕 0%</div>
            </div>
            
            <div class="objective">
                <div id="objectiveText">Objetivo: Acercate a Sempai</div>
            </div>

            <div class="police-alert" id="policeAlert">
                🚨 ¡POLICIA ALERTA! 🚨
            </div>

            <div class="inventory" id="inventory">
                <div style="margin-bottom: 10px; border-bottom: 1px solid #ff1493;">🎒 INVENTARIO</div>
                <div class="inventory-item" onclick="useWeapon('poison')">💊 Veneno</div>
                <div class="inventory-item" onclick="useWeapon('knife')">🔪 Cuchillo</div>
                <div class="inventory-item" onclick="useWeapon('trap')">🪤 Trampa</div>
                <div class="inventory-item" onclick="useWeapon('camera')">📷 Cámara</div>
            </div>
            
            <div class="controls">
                <div class="joystick-stick" id="joystick"></div>
            </div>
            
            <div class="buttons">
                <button id="interactBtn" title="Interactuar">🎯</button>
                <button id="actionBtn" title="Acción Especial">💀</button>
            </div>
            
            <div class="info">
                <div id="gameInfo">🕷️ Bienvenido a la academia... Ten cuidado</div>
            </div>

            <div class="warning" id="warning"></div>
        </div>
    </div>

    <div class="principal-dialog" id="principalDialog">
        <div class="dialog-box director-animation">
            <div style="font-size: 48px; margin-bottom: 20px;">👨‍💼</div>
            <div style="color: #ff6600; margin-bottom: 15px;">DIRECTOR DEL COLEGIO</div>
            <div id="dialogText" class="dialog-question"></div>
        </div>
        <div class="excuse-buttons" id="excuseButtons"></div>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-text" id="gameOverText"></div>
        <button onclick="location.reload()" style="width: 150px; height: 50px; font-size: 16px; margin-top: 40px;">REINICIAR</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ================== GAME ENGINE ==================
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        const camera = new THREE.OrthographicCamera(
            window.innerWidth / -2, window.innerWidth / 2,
            window.innerHeight / 2, window.innerHeight / -2,
            0.1, 1000
        );
        camera.position.z = 500;
        camera.position.x = 100;
        camera.position.y = 100;
        
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // Luz
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(200, 200, 300);
        scene.add(light);
        
        const ambientLight = new THREE.AmbientLight(0xff1493, 0.4);
        scene.add(ambientLight);

        let currentWeapon = null;
        let gameState = 'normal';
        let gameOver = false;
        let inDialogue = false;
        
        // ================== PLAYER ==================
        class Player {
            constructor() {
                this.group = new THREE.Group();
                
                // Cuerpo
                const bodyGeometry = new THREE.CapsuleGeometry(20, 40, 4, 8);
                const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0x8b0000 });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.group.add(this.body);
                
                // Cabeza
                const headGeometry = new THREE.SphereGeometry(15, 8, 8);
                const headMaterial = new THREE.MeshPhongMaterial({ color: 0xffd1a3 });
                this.head = new THREE.Mesh(headGeometry, headMaterial);
                this.head.position.y = 35;
                this.group.add(this.head);
                
                // Ojos (rojo oscuro - obsesionado)
                for (let i = -1; i <= 1; i += 2) {
                    const eyeGeometry = new THREE.SphereGeometry(3, 8, 8);
                    const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
                    const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                    eye.position.set(i * 5, 38, 12);
                    this.group.add(eye);
                }
                
                this.group.position.set(0, 0, 0);
                this.velocity = { x: 0, y: 0 };
                this.speed = 3;
                this.wasRude = false;
                scene.add(this.group);
            }
            
            update() {
                this.group.position.x += this.velocity.x;
                this.group.position.y += this.velocity.y;
                
                const limit = 300;
                this.group.position.x = Math.max(-limit, Math.min(limit, this.group.position.x));
                this.group.position.y = Math.max(-limit, Math.min(limit, this.group.position.y));
            }
            
            setVelocity(x, y) {
                this.velocity.x = x * this.speed;
                this.velocity.y = y * this.speed;
            }
        }
        
        // ================== PERSONAJES ==================
        class Character {
            constructor(name, x, y, color, type = 'normal') {
                this.name = name;
                this.group = new THREE.Group();
                this.type = type;
                this.alive = true;
                this.suspicion = 0;
                this.observedCrimes = 0;
                this.observedRudeness = 0;
                this.viewDistance = 150;
                this.isReporting = false;
                this.targetDirection = null;
                
                // Cuerpo
                const bodyGeometry = new THREE.CapsuleGeometry(18, 38, 4, 8);
                const bodyMaterial = new THREE.MeshPhongMaterial({ color: color });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.group.add(this.body);
                
                // Cabeza
                const headGeometry = new THREE.SphereGeometry(14, 8, 8);
                const headMaterial = new THREE.MeshPhongMaterial({ color: 0xffd1a3 });
                this.head = new THREE.Mesh(headGeometry, headMaterial);
                this.head.position.y = 32;
                this.group.add(this.head);
                
                // Ojos
                let eyeColor = 0xff1493;
                if (type === 'rival') eyeColor = 0x00ff00;
                if (type === 'sempai') eyeColor = 0xffff00;
                if (type === 'police') eyeColor = 0x00ccff;

                for (let i = -1; i <= 1; i += 2) {
                    const eyeGeometry = new THREE.SphereGeometry(2.5, 8, 8);
                    const eyeMaterial = new THREE.MeshPhongMaterial({ color: eyeColor });
                    const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                    eye.position.set(i * 4, 34, 10);
                    this.group.add(eye);
                }
                
                // Etiqueta de nombre
                this.nameLabel = document.createElement('div');
                this.nameLabel.className = 'character-name';
                this.nameLabel.textContent = name;
                this.nameLabel.style.position = 'absolute';
                document.getElementById('UI').appendChild(this.nameLabel);
                
                this.group.position.set(x, y, 0);
                scene.add(this.group);
            }
            
            update(playerPos, crimeJustCommitted = false, playerWasRude = false) {
                if (!this.alive) {
                    this.group.visible = false;
                    this.nameLabel.style.display = 'none';
                    return;
                }

                const dx = playerPos.x - this.group.position.x;
                const dy = playerPos.y - this.group.position.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // Si está reportando, va a la dirección
                if (this.isReporting) {
                    this.nameLabel.classList.add('npc-fleeing');
                    // Huir hacia arriba (a la dirección)
                    this.group.position.y += 5;
                    if (this.group.position.y > 500) {
                        this.group.visible = false;
                        this.nameLabel.style.display = 'none';
                    }
                    const screenPos = getScreenPosition(this.group.position);
                    this.nameLabel.style.left = (screenPos.x - 30) + 'px';
                    this.nameLabel.style.top = (screenPos.y - 50) + 'px';
                    return;
                }

                if (Math.random() < 0.02) {
                    const angle = Math.random() * Math.PI * 2;
                    this.group.position.x += Math.cos(angle) * 2;
                    this.group.position.y += Math.sin(angle) * 2;
                }
                
                const screenPos = getScreenPosition(this.group.position);
                this.nameLabel.style.left = (screenPos.x - 30) + 'px';
                this.nameLabel.style.top = (screenPos.y - 50) + 'px';

                // Si está cerca y cometes un crimen, lo ve
                if (crimeJustCommitted && distance < this.viewDistance && !this.isReporting) {
                    this.observedCrimes++;
                    this.suspicion = 100;
                    this.isReporting = true; // ¡CORRE A REPORTAR!
                    document.getElementById('gameInfo').textContent = `🏃 ¡${this.name} CORRE A LA DIRECCIÓN!`;
                }

                // Si eres grosero cerca de alguien, lo ve
                if (playerWasRude && distance < this.viewDistance && !this.isReporting) {
                    this.observedRudeness++;
                    this.suspicion = Math.min(100, this.suspicion + 20);
                }

                // Mostrar cambio de suspicion
                if (this.suspicion > 50) {
                    this.nameLabel.style.color = `rgb(255, ${Math.floor(255 * (1 - this.suspicion/100))}, 0)`;
                }
                
                return distance;
            }

            eliminate() {
                if (this.alive) {
                    this.alive = false;
                    this.group.traverse((child) => {
                        if (child.material) {
                            child.material.color.setHex(0x4d0000);
                            child.material.opacity = 0.5;
                        }
                    });
                    return true;
                }
                return false;
            }
        }
        
        // ================== FUNCIONES AUXILIARES ==================
        function getScreenPosition(worldPos) {
            const vector = worldPos.clone();
            vector.project(camera);
            
            const x = (vector.x + 1) * window.innerWidth / 2;
            const y = (1 - vector.y) * window.innerHeight / 2;
            
            return { x, y };
        }

        function showWarning(message) {
            const warning = document.getElementById('warning');
            warning.textContent = message;
            warning.style.display = 'block';
            setTimeout(() => {
                warning.style.display = 'none';
            }, 3000);
        }

        function endGame(reason) {
            gameOver = true;
            const gameOverScreen = document.getElementById('gameOverScreen');
            const gameOverText = document.getElementById('gameOverText');
            gameOverText.textContent = reason;
            gameOverScreen.classList.add('show');
            player.setVelocity(0, 0);
        }

        function calculateReputationImpact() {
            let totalSuspicion = 0;
            characters.forEach(char => {
                if (char.isReporting) {
                    totalSuspicion += 50; // Penalización alta por fuga
                } else {
                    totalSuspicion += char.observedCrimes + char.observedRudeness;
                }
            });
            return Math.max(0, 100 - totalSuspicion * 2);
        }

        function showExcuseDialog() {
            inDialogue = true;
            player.setVelocity(0, 0);
            
            const excuses = [
                { text: "No fue nada, Director. Solo estaban jugando.", result: 'random' },
                { text: "Vimos algo en el patio, pero ya pasó.", result: 'random' },
                { text: "Creo que malinterpretaron la situación.", result: 'likely_fail' },
                { text: "Fue un accidente. Todo está bajo control.", result: 'random' },
                { text: "No sé de qué hablan. Están exagerando.", result: 'likely_fail' }
            ];

            const dialogBox = document.getElementById('principalDialog');
            const dialogText = document.getElementById('dialogText');
            const excuseButtons = document.getElementById('excuseButtons');

            dialogText.textContent = '¿Qué pasó exactamente aquí?';
            excuseButtons.innerHTML = '';

            excuses.forEach((excuse, index) => {
                const btn = document.createElement('button');
                btn.className = 'excuse-btn';
                btn.textContent = excuse.text;
                btn.onclick = () => {
                    handleExcuse(excuse.result);
                    dialogBox.classList.remove('show');
                };
                excuseButtons.appendChild(btn);
            });

            dialogBox.classList.add('show');
        }

        function handleExcuse(result) {
            inDialogue = false;
            
            if (result === 'random') {
                if (Math.random() > 0.5) {
                    document.getElementById('gameInfo').textContent = '✅ Director: "De acuerdo, ten cuidado"';
                    reputation = Math.min(100, reputation + 10);
                } else {
                    document.getElementById('gameInfo').textContent = '❌ Director: "No me crees... eres culpable"';
                    reputation = Math.max(0, reputation - 30);
                }
            } else if (result === 'likely_fail') {
                if (Math.random() > 0.3) {
                    document.getElementById('gameInfo').textContent = '❌ Director: "¡Mentirosa! Llamaré a tus padres"';
                    reputation = Math.max(0, reputation - 40);
                } else {
                    document.getElementById('gameInfo').textContent = '✅ Director: "Espero que sea verdad..."';
                    reputation = Math.min(100, reputation + 5);
                }
            }
        }
        
        // ================== INICIALIZAR JUEGO ==================
        const player = new Player();
        
        const sempai = new Character('Sempai ✨', 200, 100, 0xffff00, 'sempai');
        const rival = new Character('Rival 👑', -200, 100, 0x00ff00, 'rival');
        const friend = new Character('Amiga 💙', 100, -200, 0x87ceeb, 'normal');
        const police = new Character('Policía 🚨', -300, -300, 0x00ccff, 'police');
        
        const characters = [sempai, rival, friend, police];
        
        let gameTime = 8 * 60;
        let obsesionLevel = 0;
        let reputation = 100;
        let interactionCooldown = 0;
        let sempaiAffection = 0;
        let sempaiKnowsAboutCrimes = false;
        let policeAlertLevel = 0;
        let crimesCommitted = 0;
        let lastCrimeTime = -1000;
        let waitingForDirector = false;
        
        // ================== CONTROLES ==================
        const keys = {};
        let joystickActive = false;
        let joystickPos = { x: 0, y: 0 };
        
        const joystickElement = document.getElementById('joystick');
        const controlsContainer = document.querySelector('.controls');
        
        controlsContainer.addEventListener('touchstart', (e) => {
            joystickActive = true;
            updateJoystick(e.touches[0]);
        });
        
        controlsContainer.addEventListener('touchmove', (e) => {
            if (joystickActive) {
                e.preventDefault();
                updateJoystick(e.touches[0]);
            }
        });
        
        controlsContainer.addEventListener('touchend', () => {
            joystickActive = false;
            joystickElement.style.transform = 'translate(0, 0)';
            player.setVelocity(0, 0);
        });
        
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        function updateJoystick(touch) {
            const rect = controlsContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const dx = (touch.clientX - centerX) / 60;
            const dy = (touch.clientY - centerY) / 60;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 1) {
                joystickPos.x = dx / distance;
                joystickPos.y = dy / distance;
            } else {
                joystickPos.x = dx;
                joystickPos.y = dy;
            }
            
            joystickElement.style.transform = `translate(${joystickPos.x * 35}px, ${joystickPos.y * 35}px)`;
            if (!inDialogue) player.setVelocity(joystickPos.x, joystickPos.y);
        }

        window.useWeapon = function(weapon) {
            currentWeapon = weapon;
            let msg = '';
            switch(weapon) {
                case 'poison': msg = '☠️ Veneno seleccionado'; break;
                case 'knife': msg = '🔴 Cuchillo listo'; break;
                case 'trap': msg = '⚠️ Trampa preparada'; break;
                case 'camera': msg = '📸 Espiar modo'; break;
            }
            document.getElementById('gameInfo').textContent = msg;
        }
        
        document.getElementById('interactBtn').addEventListener('click', () => {
            if (gameOver || inDialogue) return;

            let closestChar = null;
            let closestDist = Infinity;
            
            characters.forEach(char => {
                if (!char.alive) return;
                const dx = player.group.position.x - char.group.position.x;
                const dy = player.group.position.y - char.group.position.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < closestDist && dist < 80) {
                    closestDist = dist;
                    closestChar = char;
                }
            });
            
            if (closestChar && interactionCooldown === 0) {
                if (closestChar.type === 'sempai') {
                    sempaiAffection += 15;
                    obsesionLevel += 20;
                    document.getElementById('gameInfo').textContent = `💕 ¡Sempai te miró!`;
                    
                    if (sempaiAffection > 50 && sempaiKnowsAboutCrimes) {
                        endGame('💀 SEMPAI LO DESCUBRIÓ...\n"¿Qué has hecho?"\n*Ella enloqueció y te mató*\n*Luego se suicidó*');
                    }
                } else if (currentWeapon) {
                    lastCrimeTime = gameTime;
                    let crimeMsg = '';
                    
                    if (currentWeapon === 'poison') {
                        closestChar.eliminate();
                        crimeMsg = `☠️ ${closestChar.name} fue envenenada...`;
                        obsesionLevel += 30;
                        policeAlertLevel += 15;
                    } else if (currentWeapon === 'knife') {
                        closestChar.eliminate();
                        crimeMsg = `💀 ${closestChar.name} fue eliminada...`;
                        obsesionLevel += 40;
                        policeAlertLevel += 25;
                    } else if (currentWeapon === 'trap') {
                        closestChar.eliminate();
                        crimeMsg = `💥 ${closestChar.name} cayó en la trampa...`;
                        obsesionLevel += 25;
                        policeAlertLevel += 20;
                    } else if (currentWeapon === 'camera') {
                        crimeMsg = `📸 Evidencia de ${closestChar.name} recopilada...`;
                        obsesionLevel += 10;
                    }
                    
                    showWarning(crimeMsg);
                    crimesCommitted++;
                    currentWeapon = null;
                } else {
                    document.getElementById('gameInfo').textContent = `💬 Hablaste amablemente con ${closestChar.name}`;
                    player.wasRude = false;
                }
                interactionCooldown = 30;
            }
        });
        
        document.getElementById('actionBtn').addEventListener('click', () => {
            if (gameOver || inDialogue) return;
            if (interactionCooldown === 0) {
                document.getElementById('gameInfo').textContent = '😠 ¡Fuiste grosera con alguien!';
                player.wasRude = true;
                obsesionLevel += 5;
                interactionCooldown = 30;
            }
        });
        
        function handleKeyboardInput() {
            if (inDialogue) return;
            
            let moveX = 0;
            let moveY = 0;
            
            if (keys['w'] || keys['arrowup']) moveY = 1;
            if (keys['s'] || keys['arrowdown']) moveY = -1;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;
            
            if (moveX !== 0 || moveY !== 0) {
                const length = Math.sqrt(moveX * moveX + moveY * moveY);
                player.setVelocity(moveX / length, moveY / length);
            } else {
                player.setVelocity(0, 0);
            }
        }
        
        // ================== GAME LOOP ==================
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameOver) {
                renderer.render(scene, camera);
                return;
            }
            
            handleKeyboardInput();
            player.update();
            
            // Detectar si acaban de cometer un crimen
            let crimeJustCommitted = (gameTime - lastCrimeTime) < 2;
            let playerWasRude = player.wasRude;
            
            characters.forEach(char => {
                char.update(player.group.position, crimeJustCommitted, playerWasRude);
            });

            // Limpiar estado grosería
            if (gameTime % 120 === 0) {
                player.wasRude = false;
            }
            
            // Actualizar tiempo
            gameTime++;
            const hours = Math.floor(gameTime / 60);
            const minutes = gameTime % 60;
            document.getElementById('time').textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;

            // Calcular reputación basada en lo que vieron
            reputation = calculateReputationImpact();
            obsesionLevel = Math.min(100, obsesionLevel);
            
            document.getElementById('obsesionLevel').textContent = Math.floor(obsesionLevel);
            document.getElementById('reputation').textContent = Math.floor(reputation);
            document.getElementById('reputationFill').style.width = reputation + '%';

            // Verificar si alguien está reportando
            let someoneReporting = characters.some(char => char.isReporting && char.alive);
            if (someoneReporting && !waitingForDirector) {
                waitingForDirector = true;
                setTimeout(() => {
                    if (!gameOver) {
                        showExcuseDialog();
                    }
                }, 2000);
            }

            // Estado de Sempai
            const sempaiStatusDiv = document.getElementById('sempaiStatus');
            const sempaiObsesionDiv = document.getElementById('sempaiObsesion');

            if (sempai.observedCrimes > 0 || sempai.observedRudeness > 2) {
                sempaiKnowsAboutCrimes = true;
                sempaiStatusDiv.textContent = '😱 ¡SABE!';
                sempaiStatusDiv.style.color = '#ff0000';
            } else if (sempaiAffection > 60) {
                sempaiStatusDiv.textContent = '😍 Enamorado';
                sempaiStatusDiv.style.color = '#ff1493';
            } else if (sempaiAffection > 30) {
                sempaiStatusDiv.textContent = '😊 Interesado';
                sempaiStatusDiv.style.color = '#ffff00';
            } else {
                sempaiStatusDiv.textContent = '😊 Normal';
                sempaiStatusDiv.style.color = '#00ff00';
            }

            sempaiObsesionDiv.textContent = `💕 ${Math.floor(sempaiAffection)}%`;

            // Alerta Policial
            policeAlertLevel = Math.max(0, policeAlertLevel - 0.1);

            if (policeAlertLevel > 50) {
                document.getElementById('policeAlert').style.display = 'block';
            } else {
                document.getElementById('policeAlert').style.display = 'none';
            }

            // Condiciones de Game Over
            if (reputation <= 0) {
                endGame('💀 FIN DEL JUEGO\n\nTu reputación llegó a cero...\nSempai y los demás te humillan\n"¿Quién te crees que eres?"');
            }

            if (policeAlertLevel >= 100) {
                endGame('🚨 ATRAPADA 🚨\n\n¡La policía descubrió tus crímenes!\nTodas tus acciones han sido documentadas.\nNo hay escape...');
            }
            
            if (interactionCooldown > 0) interactionCooldown--;
            
            if (gameTime > 18 * 60) {
                gameTime = 8 * 60;
            }
            
            renderer.render(scene, camera);
        }
        
        // ================== RESPONSIVE ==================
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.left = window.innerWidth / -2;
            camera.right = window.innerWidth / 2;
            camera.top = window.innerHeight / 2;
            camera.bottom = window.innerHeight / -2;
            camera.updateProjectionMatrix();
        });
        
        animate();
    </script>
</body>
</html>
