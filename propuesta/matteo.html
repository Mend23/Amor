<title>¿Quieres vivir una vida entera conmigo?</title>
<style>
  :root{
    --bg:#0b0b0d;
    --card-bg:#ffffff;
    --text:#000;
    --accent:#ffd166;
    --glass: rgba(255,255,255,0.06);
  }
  html,body{
    height:100%;
    margin:0;
    background: radial-gradient(ellipse at center, #05050a 0%, #020203 60%);
    font-family: "Helvetica Neue", Arial, sans-serif;
    color:#fff;
    overflow:hidden;
  }

  /* Stars background (galaxy feel) */
  .stars {
    position:fixed;
    inset:0;
    background: transparent;
    z-index:0;
    pointer-events:none;
  }
  .stars::before, .stars::after{
    content:"";
    position:absolute;
    inset:0;
    background-image: radial-gradient(#ffffff11 1px, transparent 1px);
    background-size: 2px 2px;
    opacity:0.35;
    animation: drift 60s linear infinite;
    mix-blend-mode:screen;
  }
  .stars::after{
    background-size: 3px 3px;
    opacity:0.2;
    animation-duration: 90s;
  }
  @keyframes drift{
    from{transform: translateY(0) rotate(0);}
    to{transform: translateY(-200px) rotate(360deg);}
  }

  /* Center stage */
  .stage{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
  }

    width:min(720px,92vw);
    background:var(--card-bg);
    padding:40px 28px;
    border-radius:16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    text-align:center;
    color:var(--text);
    position:relative;
  }
