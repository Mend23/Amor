<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>¿Quieres vivir una vida entera conmigo?</title>
<style>
  :root{
    --bg:#0b0b0d;
    --card-bg:#ffffff;
    --text:#000;
    --accent:#ffd166;
    --glass: rgba(255,255,255,0.06);
  }
  html,body{
    height:100%;
    margin:0;
    background: radial-gradient(ellipse at center, #05050a 0%, #020203 60%);
    font-family: "Helvetica Neue", Arial, sans-serif;
    color:#fff;
    overflow:hidden;
  }

  /* Stars background (galaxy feel) */
  .stars {
    position:fixed;
    inset:0;
    background: transparent;
    z-index:0;
    pointer-events:none;
  }
  .stars::before, .stars::after{
    content:"";
    position:absolute;
    inset:0;
    background-image: radial-gradient(#ffffff11 1px, transparent 1px);
    background-size: 2px 2px;
    opacity:0.35;
    animation: drift 60s linear infinite;
    mix-blend-mode:screen;
  }
  .stars::after{
    background-size: 3px 3px;
    opacity:0.2;
    animation-duration: 90s;
  }
  @keyframes drift{
    from{transform: translateY(0) rotate(0);} 
    to{transform: translateY(-200px) rotate(360deg);} 
  }

  /* Planets decorative layer */
  .planets{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    mix-blend-mode:screen;
  }
  .planet{
    position:absolute;
    border-radius:50%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45), 0 0 30px rgba(255,255,255,0.03) inset;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.5));
    opacity:0.95;
    transform: translateZ(0);
  }
  .planet::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18), transparent 25%);
    mix-blend-mode:overlay;
    pointer-events:none;
  }
  .planet-label{
    position:absolute;
    left:50%;
    transform:translateX(-50%) translateY(-120%);
    font-size:12px;
    color:rgba(255,255,255,0.9);
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    white-space:nowrap;
    letter-spacing:0.4px;
    pointer-events:none;
    opacity:0.95;
  }

  /* individual planets (sizes, colors, positions, subtle animations) */
  .planet-mercurio{ width:28px; height:28px; top:10%; left:12%; background: radial-gradient(circle at 35% 30%, #f4e9d2, #c5a37a 60%, rgba(183,142,94,0.8)); animation: float-1 9s ease-in-out infinite;}
  .planet-venus{ width:44px; height:44px; top:22%; left:78%; background: radial-gradient(circle at 30% 30%, #fff2d6, #f0b36a 60%, #d68a5a 100%); animation: float-2 12s ease-in-out infinite;}
  .planet-tierra{ width:64px; height:64px; top:58%; left:18%; background: radial-gradient(circle at 28% 32%, #a8e0ff 10%, #2a9d8f 40%, #064e3b 90%); box-shadow: 0 8px 30px rgba(10,140,125,0.25); animation: rotate-slow 18s linear infinite reverse;}
  .planet-marte{ width:38px; height:38px; top:50%; left:62%; background: radial-gradient(circle at 35% 35%, #ffd9c9, #d95b43 45%, #a53c2c 100%); animation: float-3 10s ease-in-out infinite;}
  .planet-jupiter{ width:110px; height:110px; top:12%; left:44%; background: radial-gradient(circle at 25% 30%, #f7e9d6 5%, #caa87f 25%, #9b6b3e 60%, #6d4326 100%); box-shadow: 0 20px 60px rgba(120,60,20,0.35);}
  .planet-saturno{ width:92px; height:92px; top:72%; left:76%; background: radial-gradient(circle at 28% 30%, #fff6e8 5%, #f0d8b2 25%, #c9a36f 60%);}
  .planet-uranus{ width:60px; height:60px; top:30%; left:6%; background: radial-gradient(circle at 30% 30%, #e8fcff 10%, #86e1ff 45%, #41b3d3 90%);}
  .planet-neptuno{ width:70px; height:70px; top:78%; left:34%; background: radial-gradient(circle at 30% 30%, #dff1ff 10%, #79c3ff 45%, #2e83c6 90%);}
  .planet-pluton{ width:20px; height:20px; top:6%; left:86%; background: radial-gradient(circle at 30% 30%, #f6f6f6 10%, #d0c9c6 40%, #9b8f8b 90%); opacity:0.85}

  /* subtle floating/keyframe motions */
  @keyframes float-1{ 0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)} }
  @keyframes float-2{ 0%{transform:translateY(0)}50%{transform:translateY(10px)}100%{transform:translateY(0)} }
  @keyframes float-3{ 0%{transform:translateX(0)}50%{transform:translateX(8px)}100%{transform:translateX(0)} }
  @keyframes rotate-slow{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* Center stage */
  .stage{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
    padding:40px;
    box-sizing:border-box;
  }

  /* White card */
  .card {
    width:min(720px,92vw);
    background:var(--card-bg);
    padding:40px 28px;
    border-radius:16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    text-align:center;
    color:var(--text);
    position:relative;
    overflow:hidden;
  }

  .question {
    font-size:clamp(22px,4vw,36px);
    font-weight:700;
    line-height:1.1;
    letter-spacing:0.2px;
    display:inline-block;
    padding:18px 26px;
    border-radius:10px;
    position:relative;
    background: linear-gradient(90deg, rgba(255,255,255,1), rgba(255,255,255,1));
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    margin-bottom:12px;
  }

  .sub {
    color:#444;
    margin:6px 0 18px;
    font-size:15px;
  }

  .buttons{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:18px;
    flex-wrap:wrap;
  }

  .btn{
    --h:44px;
    height:var(--h);
    line-height:var(--h);
    min-width:160px;
    padding:0 18px;
    border-radius:999px;
    border:0;
    cursor:pointer;
    font-weight:700;
    font-size:15px;
    transition:transform .14s ease, box-shadow .14s ease, opacity .14s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }
  .btn:active{transform:translateY(2px) scale(.995)}

  .btn-yes{
    background: linear-gradient(90deg, #ffd166, #ff9a66);
    color:#2b2b2b;
  }
  .btn-no{
    background:transparent;
    color:#555;
    border:1px solid #eee;
  }

  /* small footer */
  .credit{
    font-size:12px;
    color:#777;
    margin-top:14px;
  }

  /* success overlay */
  .overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.6));
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  .overlay.show{opacity:1;pointer-events:auto}

  .popup{
    background: rgba(255,255,255,0.98);
    color:var(--text);
    padding:28px 30px;
    border-radius:14px;
    text-align:center;
    transform:scale(.9);
    transition:transform .35s cubic-bezier(.2,.9,.3,1);
    box-shadow: 0 18px 60px rgba(0,0,0,0.45);
  }
  .overlay.show .popup{transform:scale(1)}

  .heart{
    font-size:48px;
    color:#ff4d6d;
    display:inline-block;
    transform:scale(0.9);
    animation:beat 1s infinite ease-in-out;
  }
  @keyframes beat{
    0%{transform:scale(0.95)}
    50%{transform:scale(1.06)}
    100%{transform:scale(0.95)}
  }

  /* responsive small tweaks */
  @media (max-width:420px){
    .card{padding:24px 16px}
    .buttons{flex-direction:column}
    .btn{min-width:100%}
  }

  /* prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce){
    .stars::before, .stars::after, .planet, .popup, .heart{ animation: none !important; transition:none !important }
  }

</style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <!-- Planets layer: decorativos, con la misma estética de estrellas -->
  <div class="planets" aria-hidden="true">
    <div class="planet planet-mercurio" aria-hidden="true"><span class="planet-label">Mercurio</span></div>
    <div class="planet planet-venus" aria-hidden="true"><span class="planet-label">Venus</span></div>
    <div class="planet planet-tierra" aria-hidden="true"><span class="planet-label">Tierra</span></div>
    <div class="planet planet-marte" aria-hidden="true"><span class="planet-label">Marte</span></div>
    <div class="planet planet-jupiter" aria-hidden="true"><span class="planet-label">Júpiter</span></div>
    <div class="planet planet-saturno" aria-hidden="true"><span class="planet-label">Saturno</span></div>
    <div class="planet planet-uranus" aria-hidden="true"><span class="planet-label">Urano</span></div>
    <div class="planet planet-neptuno" aria-hidden="true"><span class="planet-label">Neptuno</span></div>
    <div class="planet planet-pluton" aria-hidden="true"><span class="planet-label">Plutón</span></div>
  </div>

  <main class="stage">
    <section class="card" role="article" aria-labelledby="q">
      <h1 id="q" class="question">¿Quieres vivir una vida entera conmigo?</h1>
      <p class="sub">Hace tiempo que quería preguntártelo. Si dices que sí, prometo que cada día será una pequeña aventura.</p>

      <div class="buttons">
        <button class="btn btn-yes" id="yesBtn">Sí, para siempre</button>
        <button class="btn btn-no" id="noBtn">Espera... ¿seguro?</button>
      </div>

      <p class="credit">— Con cariño, Matteo</p>
    </section>
  </main>

  <div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="popup" id="popup">
      <div class="heart" aria-hidden="true">❤️</div>
      <h2 id="resTitle">¡Sí!</h2>
      <p id="resText">Me llenas de felicidad. Empezamos esta aventura juntos.</p>
      <p style="margin-top:14px"><button class="btn btn-yes" id="closeBtn">Abrazos</button></p>
    </div>
  </div>

<script>
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const overlay = document.getElementById('overlay');
  const closeBtn = document.getElementById('closeBtn');

  yesBtn.addEventListener('click', ()=>{
    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden','false');
    // small celebration: change stars opacity and add gentle glow
    document.documentElement.style.setProperty('--bg','#060618');
  });
  closeBtn.addEventListener('click', ()=>{
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden','true');
  });

  // playful evasive behavior for "No" button on pointerover
  noBtn.addEventListener('pointerenter', (e)=>{
    const w = window.innerWidth;
    const moveX = (Math.random()*0.5 + 0.25) * (Math.random() < 0.5 ? -1 : 1) * w * 0.2;
    noBtn.style.transform = `translateX(${moveX}px)`;
  });
  noBtn.addEventListener('pointerleave', ()=>{ noBtn.style.transform = '' });

  // keyboard accessibility: Enter to accept, Esc to close overlay
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' && document.activeElement === yesBtn){
      yesBtn.click();
    }
    if(e.key === 'Escape'){
      if(overlay.classList.contains('show')){
        closeBtn.click();
      }
    }
  });

</script>
</body>
</html>
